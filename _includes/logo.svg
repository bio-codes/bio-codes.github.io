<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 100" aria-hidden="true" class="bio-codes-logo">
  <!-- DNA double helix (left) -->
  <g fill="none" stroke-linecap="round">
    <!-- Left strand -->
    <path d="M8,2 C8,2 30,14 30,28 C30,42 8,54 8,68 C8,82 30,94 30,98" stroke="#4A9A3A" stroke-width="5"/>
    <!-- Right strand -->
    <path d="M36,2 C36,2 14,14 14,28 C14,42 36,54 36,68 C36,82 14,94 14,98" stroke="#3D8A2F" stroke-width="5"/>
    <!-- Base pair rungs -->
    <line x1="13" y1="14" x2="31" y2="14" stroke="#6AAF4A" stroke-width="3.5"/>
    <line x1="16" y1="28" x2="28" y2="28" stroke="#6AAF4A" stroke-width="3.5"/>
    <line x1="13" y1="42" x2="31" y2="42" stroke="#6AAF4A" stroke-width="3.5"/>
    <line x1="16" y1="56" x2="28" y2="56" stroke="#6AAF4A" stroke-width="3.5"/>
    <line x1="13" y1="68" x2="31" y2="68" stroke="#6AAF4A" stroke-width="3.5"/>
    <line x1="16" y1="82" x2="28" y2="82" stroke="#6AAF4A" stroke-width="3.5"/>
  </g>
  <!-- Data pixels (between DNA and microscope) -->
  <rect x="43" y="42" width="7" height="7" rx="1" fill="#4A9A3A" opacity="0.85"/>
  <rect x="43" y="54" width="7" height="7" rx="1" fill="#2E6B50" opacity="0.6"/>
  <rect x="53" y="48" width="6" height="6" rx="1" fill="#6AAF4A" opacity="0.55"/>
  <rect x="53" y="58" width="6" height="6" rx="1" fill="#4A9A3A" opacity="0.4"/>
  <!-- Microscope (right) -->
  <g fill="#1B4B5A">
    <!-- Eyepiece top -->
    <rect x="72" y="5" width="16" height="10" rx="3"/>
    <!-- Body tube -->
    <rect x="76" y="15" width="8" height="32" rx="1.5"/>
    <!-- Objective nosepiece -->
    <path d="M73,47 L87,47 L85,54 L75,54 Z"/>
    <!-- Stage platform -->
    <rect x="62" y="57" width="34" height="5" rx="2"/>
    <!-- Arm structure -->
    <path d="M86,10 L95,10 L95,62 L91,62 L91,14 L86,14 Z"/>
    <!-- Pillar -->
    <rect x="90" y="57" width="5" height="28" rx="1"/>
    <!-- Base -->
    <path d="M64,84 L102,84 Q106,84 106,88 L106,90 Q106,94 102,94 L64,94 Q60,94 60,90 L60,88 Q60,84 64,84 Z"/>
    <!-- Focus knob -->
    <circle cx="95" cy="38" r="4.5" fill="#245E6F"/>
  </g>
</svg>
