<section class="section" id="features">
    <div class="container">
        <p class="section-eyebrow">{{ site.data.features.section_eyebrow }}</p>
        <h2 class="section-title">{{ site.data.features.section_title }}</h2>
        <p class="section-sub">{{ site.data.features.section_sub }}</p>
        <div class="features-grid">
            {% for feature in site.data.features.features %}
            <div class="feature-card">
                {% if feature.icon != "" %}<div class="feature-icon">{{ feature.icon }}</div>{% endif %}
                <h3 class="feature-title">{{ feature.title }}</h3>
                <p class="feature-desc">{{ feature.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
