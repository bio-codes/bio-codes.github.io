# _data/features.yml
# ─────────────────────────────────────────────────────────────────
# Capability feature tiles (the 6-cell grid on the landing page).
# Reorder, add, or edit features here without touching HTML.
# ─────────────────────────────────────────────────────────────────

section_eyebrow: Capabilities
section_title: Built for scientific data & bioimaging
section_sub: >
  Designed for the specific problems of large-scale imaging data
  in research.

features:
  - icon: ""
    title: ISO 24138:2024 Compliant
    description: >
      Follows the international standard, so codes generated anywhere
      are compatible everywhere — across institutions, repositories, and tools.

  - icon: ""
    title: High Performance
    description: >
      Rust-based engine processes data at 1+ GB/s — up to 184× faster
      than the pure Python reference implementation, and faster than SHA-256.

  - icon: ""
    title: Format Agnostic
    description: >
      Works with OME-TIFF, OME-Zarr, CZI, ND2, LIF, DICOM, HDF5 and
      virtually any binary scientific data format.

  - icon: ""
    title: FAIR Principles
    description: >
      Meets the Findable, Accessible, Interoperable, and Reusable data
      requirements from EOSC and European funding bodies.

  - icon: ""
    title: AI-Ready Data
    description: >
      Content-based identifiers survive format conversions, so provenance
      stays intact when datasets move into AI training pipelines.

  - icon: ""
    title: Platform Integration
    description: >
      Native plugins for OMERO and Galaxy, with Napari, CellProfiler,
      and ImageJ integrations in progress.
