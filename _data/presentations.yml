# _data/presentations.yml
# ─────────────────────────────────────────────────────────────────
# Public BIOCODES presentations, posters, and flash talks.
#
# Each .pptx in /Presentations was converted to PDF (LibreOffice) and
# placed in /assets/presentations/. The page below loops over this
# list: every entry is viewable inline and downloadable, and carries
# a CC BY 4.0 attribution line built from `presenter` + the project.
#
# To add a presentation:
#   1. Drop the PDF into /assets/presentations/
#   2. Add an entry here (newest first). `file` is the PDF filename.
# Fields: title, presenter, affiliation, event, date (ISO, for order),
#   date_display, type, file, license_year, event_url (optional).
# ─────────────────────────────────────────────────────────────────

