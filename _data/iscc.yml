# _data/iscc.yml
# ─────────────────────────────────────────────────────────────────
# Explanatory copy for the ISCC standard, ISCC-SUM, and ISCC-ID.
# Used in the "How It Works" / "About ISCC" section.
# ─────────────────────────────────────────────────────────────────

standard:
  name: International Standard Content Code
  short: ISCC
  iso: ISO 24138
  iso_url: https://www.iso.org/standard/77899.html
  homepage_url: https://iscc.codes/
  spec_url: https://iscc.codes/specification/
  concept_url: https://iscc.codes/concept/
  description: >
    A standardised (ISO 24138) multi-component fingerprint for various
    media types and file formats. Computed from the asset itself — it
    can never be removed or decoupled from the data.
  similarity_levels:
    - label: Semantic level
      description: Detects conceptually related content
    - label: Syntactic level
      description: Detects near-duplicate and structurally similar content
    - label: Data level
      description: Detects exact copies via cryptographic hash

iscc_id:
  name: ISCC-ID
  url: https://core.iscc.codes/iscc_id/
  registry_url: https://github.com/iscc/iscc-registry
  did_method_url: https://ieps.iscc.codes/iep-0015/
  description: >
    A persistent identifier derived from ISCC content codes. ISCC-IDs
    connect raw data, processed derivatives, and published figures into
    one auditable provenance chain.
  properties:
    - label: Fingerprinting
      description: Helps find metadata even when filenames or paths have changed.
    - label: Digital signing
      description: Proves authenticity of the content and its originator.
    - label: Timestamping
      description: Demonstrates when content was created or registered.
    - label: Secure linking
      description: >
        Verifies provenance across repositories, publications,
        and analysis pipelines.
  components:
    - number: 1
      name: ISCC-CODE
      description: Algorithmically generated, reproducible data descriptor.
      url: https://github.com/iscc/iscc-core
    - number: 2
      name: Actor
      description: Entity owning the ISCC-ID.
      url: https://github.com/iscc/iscc-registry
    - number: 3
      name: Creation Time
      description: Timestamp of ISCC-ID creation.
      url:
    - number: 4
      name: Metadata URL
      description: URL for accessing ISCC-ID metadata.
      url: https://iscc.codes/specification/
